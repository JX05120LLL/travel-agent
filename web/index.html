<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行规划助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fc;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== 顶部栏 ===== */
    .header {
      width: 100%;
      max-width: 860px;
      padding: 20px 28px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
    }

    .header .icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
    }

    .header h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.2px; }
    .header p { font-size: 13px; color: #aaa; margin-top: 2px; font-weight: 300; }

    /* ===== 聊天区域 ===== */
    .chat-container {
      width: 100%;
      max-width: 860px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ===== 消息 ===== */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 75%;
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .msg.assistant .avatar {
      background: #f0f2f8;
      border: 1px solid #e8e8f0;
    }

    .msg .content { flex: 1; }

    .msg.user .content { text-align: right; }

    .msg .bubble {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
      max-width: 100%;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
      text-align: left;
    }

    .msg.assistant .bubble {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ===== 思考过程（灰色小字） ===== */
    .thinking-block {
      background: #f5f6f8;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 12.5px;
      color: #777;
      line-height: 1.65;
      border: 1px solid #ebebed;
    }

    .thinking-block .label {
      font-size: 10px;
      font-weight: 500;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .thinking-block .label::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      background: #ccc;
      border-radius: 50%;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ===== 工具结果 ===== */
    .tool-block {
      background: #fafbfd;
      border: 1px solid #e4e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      font-size: 11.5px;
      color: #666;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      white-space: pre-wrap;
      line-height: 1.55;
      border-left: 3px solid #667eea;
    }

    /* ===== MD 渲染区 ===== */
    .md-body { }
    .md-body h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; margin: 0 0 10px; }
    .md-body h2 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin: 12px 0 7px; }
    .md-body h3 { font-size: 14px; font-weight: 500; color: #333; margin: 10px 0 5px; }
    .md-body p { margin: 5px 0; }
    .md-body ul, .md-body ol { padding-left: 20px; margin: 6px 0; }
    .md-body li { margin: 3px 0; line-height: 1.65; }
    .md-body code {
      background: #f0f0f5; padding: 1px 5px;
      border-radius: 3px; font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #764ba2;
    }
    .md-body pre {
      background: #1a1a1a; border-radius: 8px;
      padding: 12px; overflow-x: auto; margin: 8px 0;
    }
    .md-body pre code {
      background: none; padding: 0;
      color: #d4d4d4; font-size: 12px;
      line-height: 1.6;
    }
    .md-body strong { font-weight: 600; }
    .md-body em { color: #666; font-style: italic; }
    .md-body a { color: #667eea; text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body blockquote {
      border-left: 3px solid #667eea;
      padding-left: 12px; color: #777;
      margin: 6px 0; font-style: italic;
    }
    .md-body table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .md-body th, .md-body td {
      border: 1px solid #e5e5e5; padding: 6px 10px;
      text-align: left; font-size: 13px;
    }
    .md-body th { background: #f7f7f8; font-weight: 500; }
    .md-body hr { border: none; border-top: 1px solid #e5e5e5; margin: 12px 0; }

    /* ===== 打字机光标 ===== */
    .typing-cursor::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
      color: #667eea;
      margin-left: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ===== 输入区域 ===== */
    .input-area {
      width: 100%;
      max-width: 860px;
      padding: 14px 28px 24px;
      background: #fff;
      border-top: 1px solid #f0f0f0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      background: #f5f6fa;
      border: 1.5px solid #e4e8f0;
      border-radius: 14px;
      padding: 5px 5px 5px 16px;
      align-items: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.07);
    }

    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      padding: 7px 0;
      font-family: inherit;
    }

    .input-wrapper input::placeholder { color: #bbb; }

    .input-wrapper button {
      padding: 9px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; border: none;
      border-radius: 10px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
      flex-shrink: 0;
    }

    .input-wrapper button:hover { opacity: 0.88; transform: scale(1.02); }
    .input-wrapper button:active { transform: scale(0.97); }
    .input-wrapper button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 3px; }

    /* ===== 空状态 ===== */
    .empty-hint {
      text-align: center;
      padding: 48px 24px;
      color: #ccc;
      font-size: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .empty-hint .big-icon { font-size: 44px; opacity: 0.25; }
  </style>
</head>
<body>

<div class="header">
  <div class="icon">✈️</div>
  <div>
    <h1>旅行规划助手</h1>
    <p>让你的旅行更简单</p>
  </div>
</div>

<div class="chat-container" id="chat">
  <div class="empty-hint" id="emptyHint">
    <div class="big-icon">🌍</div>
    <div>问我任何关于旅行的问题</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <input id="msgInput" placeholder="输入你的问题，回车发送..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
// ========== 流式聊天逻辑 ==========

function escape(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 追加用户消息
function addUserMsg(text) {
  const c = document.getElementById('chat');
  document.getElementById('emptyHint').style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar">🧑</div><div class="content"><div class="bubble">' + escape(text) + '</div></div>';
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

// 创建助手气泡
function createAssistantEl() {
  const c = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML =
    '<div class="avatar">✈️</div>' +
    '<div class="content">' +
      '<div class="thinking-block" id="thinkingBlock" style="display:none">' +
        '<div class="label">思考中</div>' +
        '<div class="text" id="thinkingText"></div>' +
      '</div>' +
      '<div class="tool-block" id="toolBlock" style="display:none"></div>' +
      '<div class="bubble" id="bubble">' +
        '<div class="md-body" id="mdBody"></div>' +
      '</div>' +
    '</div>';
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
  return {
    el: div,
    thinkingBlock: div.querySelector('#thinkingBlock'),
    thinkingText: div.querySelector('#thinkingText'),
    toolBlock: div.querySelector('#toolBlock'),
    bubble: div.querySelector('#bubble'),
    mdBody: div.querySelector('#mdBody'),
  };
}

function send() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addUserMsg(text);
  const el = createAssistantEl();
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  // --- 状态变量 ---
  let thinkingText = '';       // 灰色思考块累积文字
  let toolText = '';           // 工具结果累积文字
  let finalText = '';          // 最终回复累积（不含思考内容）
  let thinkingMinTime = 2000;  // 思考块最少显示2秒
  let thinkingStartTime = 0;
  let isInThinking = true;      // 是否还在思考阶段
  let switchTimer = null;

  fetch('/chat', {
    method: 'POST',
    body: new URLSearchParams({message: text}),
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
  }).then(resp => {
    if (!resp.ok) { done(); return; }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    function pump() {
      reader.read().then(({done: done_read, value}) => {
        if (done_read) { done(); return; }

        const chunk = decoder.decode(value, {stream: true});
        chunk.split('\n').forEach(line => {
          if (!line.startsWith('data: ')) return;
          const data = line.slice(6).trim();
          if (!data || data === '[DONE]') return;

          if (data === 'TOOL_CALL') {
            // 进入工具阶段：隐藏思考，显示工具块
            isInThinking = false;
            el.thinkingBlock.style.display = 'none';
            el.toolBlock.style.display = 'block';
            el.toolBlock.textContent = '';
            toolText = '';
            clearTimeout(switchTimer);
          } else if (data.startsWith('TOOL_RESULT:')) {
            toolText += data.slice(11);
            el.toolBlock.textContent = toolText;
            scrollChat();
          } else if (data.startsWith('TEXT:')) {
            const t = data.slice(5);

            if (isInThinking) {
              // 思考阶段：累积到思考块
              if (thinkingStartTime === 0) {
                thinkingStartTime = Date.now();
                el.thinkingBlock.style.display = 'block';
                thinkingText = t;
                el.thinkingText.textContent = thinkingText;

                // 最少2秒后自动切换到正式回复
                switchTimer = setTimeout(() => {
                  enterFinalPhase();
                }, thinkingMinTime);
              } else {
                // 持续累积思考内容
                thinkingText += t;
                el.thinkingText.textContent = thinkingText;
              }
            } else {
              // 正式回复阶段：直接追加显示（不渲染markdown），流结束后再渲染
              finalText += t;
              el.mdBody.textContent = finalText;
              scrollChat();
            }
          }
        });

        scrollChat();
        pump();
      }).catch(() => done());
    }

    pump();
  }).catch(() => done());

  // 进入正式回复阶段
  function enterFinalPhase() {
    isInThinking = false;
    el.thinkingBlock.style.display = 'none';
    el.mdBody.classList.add('typing-cursor');
    // 只显示最终答案，不显示思考内容
    el.mdBody.textContent = finalText || '';
    scrollChat();
  }

  function done() {
    clearTimeout(switchTimer);
    sendBtn.disabled = false;
    el.mdBody.classList.remove('typing-cursor');

    // 隐藏思考块和工具块，只显示最终答案
    el.thinkingBlock.style.display = 'none';
    el.toolBlock.style.display = 'none';

    if (!finalText) {
      el.mdBody.textContent = '出错了，请重试';
    } else {
      // 最终一次性渲染 markdown
      el.mdBody.innerHTML = marked.parse(finalText);
    }
    scrollChat();
  }

  function scrollChat() {
    const c = document.getElementById('chat');
    c.scrollTop = c.scrollHeight;
  }
}
</script>

</body>
</html>
