<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行规划助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ request.url_for('static', path='app.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="workspace-shell" id="workspaceShell">
      <aside class="session-panel" id="sessionPanel">
        <div class="session-panel-top">
          <div class="session-app-brand">
            <div class="session-app-badge">TA</div>
            <div>
              <p class="session-panel-kicker">旅行助手</p>
              <h2>会话</h2>
            </div>
          </div>
          <button type="button" class="session-create-btn" id="newSessionBtn">新对话</button>
        </div>

        <div class="session-list-wrap">
          <div class="session-list-head">
            <span>最近会话</span>
            <button type="button" class="session-refresh-btn" id="refreshSessionsBtn">刷新</button>
          </div>
          <div class="session-list" id="sessionList"></div>
          <div class="session-empty hidden" id="sessionEmpty">
            还没有历史会话。点击“新对话”或直接发送一条消息，就会自动创建会话。
          </div>
        </div>
        <button
          type="button"
          class="sidebar-resize-handle"
          id="sidebarResizeHandle"
          aria-label="调整侧边栏宽度"
          title="拖动调整侧边栏宽度，双击恢复默认宽度"
        ></button>
        <button
          type="button"
          class="sidebar-collapse-btn"
          id="sidebarCollapseBtn"
          aria-label="收起侧边栏"
          title="收起或展开侧边栏"
        >
          <span class="sidebar-collapse-icon" aria-hidden="true"></span>
        </button>
      </aside>

      <section class="chat-panel">
        <header class="chat-header chat-header-compact">
          <div class="chat-header-main">
            <div class="brand-block brand-block-compact">
              <div class="brand-mark">TA</div>
              <div class="header-copy">
                <p class="header-kicker">旅行规划</p>
                <h1 id="activeSessionTitle">新对话</h1>
                <p class="header-subtitle">告诉我目的地和偏好，我们直接开始做行程。</p>
              </div>
            </div>
          </div>

        </header>

        <div class="chat-stage chat-stage-dual">
          <div class="chat-scroll" id="chatScroll">
            <section class="welcome-card welcome-card-compact" id="welcomeCard">
              <div class="welcome-card-grid">
                <div class="welcome-card-copy">
                  <p class="welcome-label">开始对话</p>
                  <h2>把旅行目标说清，我们直接开始规划。</h2>
                  <p class="welcome-text">
                    例如：“帮我做一个杭州两天周末行程，预算中等，想轻松一点，偏美食和散步，不想走太多路。”
                  </p>
                  <div class="welcome-note">
                    <span class="welcome-note-title">建议一起说明：</span>
                    <span>出发地、天数、预算、出行月份、偏好节奏，以及是否需要酒店和交通建议。</span>
                  </div>
                </div>

                <div class="welcome-card-side">
                  <div class="welcome-side-block">
                    <span class="welcome-side-label">可以直接这样问</span>
                    <div class="prompt-strip prompt-strip-welcome">
                      {% for prompt in suggestion_prompts %}
                      <button type="button" class="prompt-chip" data-prompt="{{ prompt }}">{{ prompt }}</button>
                      {% endfor %}
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="current-trip-shell hidden" id="currentTripPanel" aria-live="polite"></section>

            <div id="messageList"></div>
          </div>

          <form class="composer composer-floating" id="composerForm">
            <div class="composer-box">
              <textarea
                id="messageInput"
                rows="1"
                placeholder="输入目的地、天数和偏好，我会直接给你一条龙旅行方案"
              ></textarea>
              <button type="submit" id="sendBtn">发送</button>
            </div>
          </form>
        </div>
      </section>
    </section>
  </main>

  <section class="workspace-data-sink" aria-hidden="true" hidden>
    <div id="planOptionList"></div>
    <div id="planOptionEmpty" class="hidden"></div>
    <div id="preferenceList"></div>
    <div id="preferenceEmpty" class="hidden"></div>
    <div id="comparisonList"></div>
    <div id="comparisonEmpty" class="hidden"></div>
    <div id="tripList"></div>
    <div id="tripEmpty" class="hidden"></div>
    <div id="checkpointList"></div>
    <div id="checkpointEmpty" class="hidden"></div>
    <div id="eventList"></div>
    <div id="eventEmpty" class="hidden"></div>
    <div id="recallList"></div>
    <div id="recallEmpty" class="hidden"></div>
  </section>

  <script>
    window.TRAVEL_AGENT_CONFIG = {
      chatEndpoint: "/chat",
      sessionsEndpoint: "/sessions",
      planOptionsPath: "/plan-options"
    };
  </script>
  <script src="{{ request.url_for('static', path='markdown.js') }}"></script>
  <script src="{{ request.url_for('static', path='app.js') }}"></script>
</body>
</html>
